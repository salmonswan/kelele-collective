<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the

    The path provided below has to start and end with a slash "/" in order for

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kelele Collective — Uganda's vetted creative directory.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kelele">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kelele Collective</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Service worker update detection bridge.
    // Detects when a new SW is installed & waiting, exposes to Dart via callback.
    if ('serviceWorker' in navigator) {
      var _swUpdateReady = false;
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (!reg) return;
        // If a SW is already waiting when the page loads
        if (reg.waiting) {
          _swUpdateReady = true;
          if (window._flutter_sw_update_cb) window._flutter_sw_update_cb();
        }
        // Detect newly installed SW waiting to activate
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              _swUpdateReady = true;
              if (window._flutter_sw_update_cb) window._flutter_sw_update_cb();
            }
          });
        });
      });
      // Called by Dart when user taps "Refresh"
      window._flutter_sw_skip_waiting = function() {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg && reg.waiting) reg.waiting.postMessage({type: 'SKIP_WAITING'});
        });
      };
      // Reload when the new SW takes control
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
