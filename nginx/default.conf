server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — GoRouter deep links
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip Flutter assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm text/xml;
    gzip_min_length 256;

    # Never cache entry points — index.html + Flutter bootstrap JS
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache hashed static assets long-term
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
